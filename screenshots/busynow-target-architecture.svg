  <text x="352" y="860" class="box-title">How it works</text>
  <text x="352" y="888" class="body">Users reach BusyNow through CloudFront. Static assets are served from S3, while API requests continue to the ALB and</text>
  <text x="352" y="912" class="body">then the ECS API layer. Requests are rate-limited before the shared Redis or ElastiCache layer is consulted.</text>
  <text x="352" y="936" class="body">If cached or stale data exists, BusyNow can avoid a Google call. When upstream calls are needed, a concurrency guard</text>
  <text x="352" y="960" class="body">applies backpressure to protect costs and stability. Secrets, logging, and check-in data remain on AWS-managed services.</text>

