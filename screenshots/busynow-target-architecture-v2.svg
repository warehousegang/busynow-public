  <text x="352" y="860" class="box-title">How it works</text>
  <text x="352" y="888" class="body">Users reach BusyNow through CloudFront. Static assets are served from S3, while API requests continue to the ALB</text>
  <text x="352" y="912" class="body">and the ECS API layer. Requests are rate-limited before the shared Redis or ElastiCache layer is consulted.</text>
  <text x="352" y="936" class="body">If cached or stale data exists, BusyNow can avoid a Google call. If upstream calls are still needed, the concurrency</text>
  <text x="352" y="960" class="body">guard adds backpressure so load spikes or Google failures do not turn into runaway cost or cascading failure.</text>

