  <text x="1096" y="512" text-anchor="middle" class="small-note">and before Google traffic grows</text>

  <rect x="1210" y="470" width="176" height="60" rx="14" fill="white" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="1298" y="492" text-anchor="middle" class="small-note">TTL cache plus stale fallback</text>
  <text x="1298" y="512" text-anchor="middle" class="small-note">when upstream calls fail</text>

  <rect x="1404" y="466" width="202" height="72" rx="14" fill="white" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="4 4"/>
